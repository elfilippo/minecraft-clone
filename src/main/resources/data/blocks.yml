# Block definitions for minecraft-clone
# Each entry defines one block by its registry ID.
#
# FIELDS:
#   id:         unique string identifier used in code via BlockRegistry.get("id")
#   type:       CUBE | STAIRS | SLAB | FENCE  (default: CUBE)
#   full:       true if block fills its entire 1x1x1 volume, used for face culling (default: true)
#   breakable:  whether the player can break this block (default: true)
#   texture:    single texture name for all faces
#   top:        texture for top face (overrides texture)
#   bottom:     texture for bottom face (overrides texture)
#   side:       texture for side faces (overrides texture)
#
# NOTE: texture names are filenames in textures/block/ without the .png extension
# NOTE: full should be false for any block that doesn't fill the entire cube (stairs, slabs, fences)

blocks:

  # ---- NATURAL ----

  - id: grass_block
    texture: grass_block_side
    top: grass_block_top
    bottom: dirt

  - id: dirt
    texture: dirt

  - id: stone
    texture: stone

